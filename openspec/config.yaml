context: |
  Sum Beach Trivia — a self-hosted trivia web app for one annual friends' beach
  trip. SINGLE GAME ONLY: one game collected over a few weeks, run one night;
  no multi-tenancy, no other hosters. Travis is sole owner/maintainer.
  Stack: FastAPI + SQLite, plain HTML/JS (no build step), polling, Claude vision
  for grading handwritten answer photos. Four browser screens served from one
  sprite URL: contribute (pre-game), host (run the game), play (teams, phones),
  display (big-screen/TV, read-only). Tone: fun friends' beach trip — never
  "bar"/"pub". These proposals capture INTENT + ACCEPTANCE CRITERIA only;
  technical design + tasks are produced per-ticket later.
