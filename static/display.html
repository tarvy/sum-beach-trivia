<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="only light">
  <title>Display — Sum Beach Trivia</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { overflow: hidden; }
    .display-root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .display-brand {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }
    /* mid-size headline: round/section titles that sit above more content */
    .display-title--md { font-size: clamp(2rem, 5.5vw, 3.6rem); margin-bottom: 0.6rem; }
    .display-teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.8rem;
      width: 100%;
      max-width: 1000px;
      margin-top: 1rem;
    }
    .team-chip {
      background: var(--ground-2);
      border: 1px solid var(--ink);
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2.2vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .grid-label {
      font-family: var(--font-mono);
      font-size: clamp(0.7rem, 1.4vw, 0.9rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2rem;
    }
    .display-q-list {
      list-style: none;
      width: 100%;
      max-width: min(92vw, 950px);
      text-align: left;
    }
    .display-q-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--ink);
      font-family: var(--font-body);
      font-size: clamp(1.15rem, 2.6vw, 2rem);
      line-height: 1.4;
    }
    .display-q-item:last-child { border-bottom: none; }
    .display-q-item .badge { font-size: clamp(0.62rem, 1.2vw, 0.9rem); }
    .display-q-num {
      font-family: var(--font-mono);
      font-size: clamp(0.7rem, 1.3vw, 1rem);
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--ink);
      flex-shrink: 0;
      padding-top: 0.3em;
      min-width: 2.5em;
    }
    .lb-display-wrap {
      width: 100%;
      max-width: 700px;
    }
    /* podium: 1st/2nd/3rd get card treatment, gold on top */
    .lb-display-row.podium-1, .lb-display-row.podium-2, .lb-display-row.podium-3 {
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      padding: 0.3em 0.55em;
      margin-bottom: 0.3em;
    }
    .lb-display-row.podium-1 { background: var(--accent);   box-shadow: var(--shadow); font-size: 1.15em; }
    .lb-display-row.podium-2 { background: var(--ground-2); box-shadow: var(--shadow-sm); }
    .lb-display-row.podium-3 { background: var(--ground-3); box-shadow: var(--shadow-sm); }
    .lb-empty {
      font-family: var(--font-mono);
      font-size: clamp(0.8rem, 1.6vw, 1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 1rem;
    }
    .lobby-qr {
      width: clamp(180px, 26vmin, 320px);
      height: auto;
      margin-top: 1.5rem;
      background: #fff;
      padding: 0.75rem;
      border: 1px solid var(--ink);
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius);
    }
    .join-url {
      font-family: var(--font-mono);
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      margin-top: 1rem;
      color: var(--ink-soft);
    }
    .join-url strong { color: var(--ink); }
    /* the written-out URL people type into their phones */
    .url-callout {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: clamp(1.3rem, 4vw, 2.8rem);
      background: var(--accent);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.3em 0.6em;
      margin-top: 1.5rem;
      word-break: break-all;
    }
    /* pens-down (and other shouty) banner */
    .banner {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      background: var(--danger);
      color: #fff;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.35em 0.8em;
      margin-bottom: 1.2rem;
    }
    /* single big question (final round / tiebreak) */
    .final-q {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: min(92vw, 1000px);
      margin-top: 1rem;
    }
    .writing-cue {
      font-family: var(--font-mono);
      font-size: clamp(0.8rem, 1.6vw, 1.05rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-top: 1.25rem;
    }
    .winner-cup { font-size: clamp(3rem, 8vw, 5rem); line-height: 1; }
    .paused-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--ground);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  <span class="display-brand">Sum Beach Trivia</span>

  <div class="display-root" id="display-root">
    <!-- populated by JS -->
    <div class="display-phase" id="d-phase">CONNECTING</div>
    <div class="display-title" id="d-title">Sum Beach<br><span>Trivia</span></div>
  </div>

  <!-- shown on top of ANY phase while the host has the game paused -->
  <div class="paused-overlay hidden" id="paused-overlay">
    <div class="display-phase">PAUSED</div>
    <div class="display-title">Back in<br><span>a minute 🍹</span></div>
  </div>

  <script>
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const root = document.getElementById('display-root');

    async function poll() {
      try {
        const [stateRes, lbRes, teamsRes] = await Promise.all([
          fetch('/api/state'),
          fetch('/api/leaderboard'),
          fetch('/api/teams')
        ]);
        if (!stateRes.ok) return;
        const state = await stateRes.json();
        const lb    = lbRes.ok ? await lbRes.json() : {teams:[]};
        const teams = teamsRes.ok ? await teamsRes.json() : {teams:[]};
        render(state, lb, teams);
      } catch (_) {}
    }

    function render(state, lb, teamsData) {
      const {phase, paused, current_round} = state;
      const teams = teamsData.teams || [];
      document.getElementById('paused-overlay').classList.toggle('hidden', !paused);

      switch (phase) {
        case 'draft':        renderDraft(teams); break;
        case 'lobby':        renderLobby(teams); break;
        case 'round_open':   renderRound(current_round, false); break;
        case 'round_closed': renderRound(current_round, true); break;
        case 'marking':      renderMarking(lb.teams); break;
        case 'reveal':       renderReveal(current_round, lb.teams); break;
        case 'final_wager':  renderFinalWager(lb.teams, current_round); break;
        case 'final_open':   renderFinal(current_round); break;
        case 'tiebreak':     renderTiebreak(state.tiebreak_question); break;
        case 'done':         renderDone(lb.teams); break;
        default:             renderStandby(phase.replace(/_/g,' '), '');
      }
    }

    // ── shared pieces ──

    function renderStandby(phaseLabel, message) {
      root.innerHTML = `
        <div class="display-phase">${esc(phaseLabel.toUpperCase())}</div>
        <div class="display-title">${esc(message)}</div>
      `;
    }

    function teamChips(teams, label) {
      if (!teams.length) return '';
      return `
        <div class="grid-label">${esc(label)}</div>
        <div class="display-teams-grid">${teams.map(t => `<div class="team-chip">${esc(t.name)}</div>`).join('')}</div>
      `;
    }

    // Leaderboard rows; podium=true dresses up 1st/2nd/3rd (medals + cards).
    function lbRows(teams, podium) {
      if (!teams || !teams.length) return `<p class="lb-empty">No scores yet</p>`;
      const medals = ['🥇','🥈','🥉'];
      return `<div class="lb-display-wrap lb-display">${teams.map((t, i) => `
        <div class="lb-display-row${podium && i < 3 ? ' podium-' + (i + 1) : ''}">
          <span class="lb-display-rank">${podium && i < 3 ? medals[i] : i + 1}</span>
          <span class="lb-display-name">${esc(t.name)}</span>
          <span class="lb-display-score">${t.total}</span>
        </div>`).join('')}</div>`;
    }

    function qItems(questions, withAuthors) {
      return (questions || []).map((q, i) =>
        `<li class="display-q-item">
          <span class="display-q-num">${String(i + 1).padStart(2, '0')}</span>
          <span>${esc(q.text)}${withAuthors && q.author_name ? ` <span class="badge badge--dim">by ${esc(q.author_name)}</span>` : ''}</span>
        </li>`
      ).join('');
    }

    // ── per-phase renderers ──

    function renderDraft(teams) {
      root.innerHTML = `
        <div class="display-phase">GET YOUR QUESTIONS IN!</div>
        <div class="display-title">Sum Beach<br><span>Trivia</span></div>
        <div class="url-callout">${esc(location.host)}/contribute.html</div>
        <div class="writing-cue">Type that into your phone ☝️</div>
        ${teamChips(teams, 'Teams so far')}
      `;
    }

    function renderLobby(teams) {
      root.innerHTML = `
        <div class="display-phase">LOBBY — SCAN TO JOIN</div>
        <div class="display-title">Sum Beach<br><span>Trivia</span></div>
        <img src="/api/qr?origin=${encodeURIComponent(location.origin)}" alt="Scan to join on your phone" class="lobby-qr">
        <div class="join-url">or go to <strong>${esc(location.host)}/play.html</strong></div>
        ${teams.length
          ? teamChips(teams, 'Teams in')
          : '<p class="grid-label">No teams yet — scan to be first</p>'}
      `;
    }

    function renderRound(round, pensDown) {
      if (!round) { renderStandby(pensDown ? 'Pens down' : 'Round open', ''); return; }
      root.innerHTML = `
        ${pensDown ? '<div class="banner">✋ PENS DOWN — hand in your sheets!</div>' : ''}
        <div class="display-phase">${round.is_final ? 'FINAL ROUND' : pensDown ? 'ROUND CLOSED' : 'ROUND OPEN'}</div>
        <div class="display-title display-title--md">${esc(round.title || '')}</div>
        <ol class="display-q-list" aria-label="Questions">${qItems(round.questions, false)}</ol>
        ${pensDown ? '' : '<div class="writing-cue">✍️ Write your answers on paper</div>'}
      `;
    }

    // Standings interstitial while the MC marks — totals tick up live.
    function renderMarking(lbTeams) {
      root.innerHTML = `
        <div class="display-phase">MARKING</div>
        <div class="display-title display-title--md">Scores coming up…</div>
        ${lbRows(lbTeams, false)}
      `;
    }

    // Reveal: who wrote each question in the just-graded round, plus scores.
    // The MC reads the answers aloud — they never appear on screen.
    function renderReveal(round, lbTeams) {
      root.innerHTML = `
        <div class="display-phase">REVEAL</div>
        ${round ? `<div class="display-title display-title--md">${esc(round.title || '')}</div>
        <ol class="display-q-list" aria-label="Questions and authors">${qItems(round.questions, true)}</ol>` : ''}
        <div class="display-phase" style="margin-top: 1.5rem;">SCORES SO FAR</div>
        ${lbRows(lbTeams, true)}
      `;
    }

    function renderFinalWager(lbTeams, round) {
      root.innerHTML = `
        <div class="display-phase">FINAL ROUND</div>
        <div class="display-title display-title--md">Place your wagers!</div>
        <div class="writing-cue">No cap — bet what you dare. Check the standings 👇</div>
        ${lbRows(lbTeams, false)}
      `;
    }

    function renderFinal(round) {
      if (!round) { renderStandby('Final round', ''); return; }
      const q = (round.questions || [])[0];
      root.innerHTML = `
        <div class="display-phase">FINAL ROUND</div>
        <div class="display-title display-title--md">${esc(round.title || 'Final Round')}</div>
        <p class="final-q">${esc(q ? q.text : '')}</p>
        <div class="writing-cue">${q && q.item_count
          ? `${q.item_count} answers${q.ordered ? ' — in order' : ''} · write them on paper ✍️`
          : '✍️ Write your answer on paper'}</div>
      `;
    }

    function renderTiebreak(question) {
      root.innerHTML = `
        <div class="display-phase">TIEBREAK</div>
        <div class="display-title display-title--md">TIEBREAKER!</div>
        ${question ? `<p class="final-q">${esc(question)}</p>` : ''}
        <div class="writing-cue">🎯 Closest guess wins</div>
      `;
    }

    function renderDone(lbTeams) {
      const winner = (lbTeams || [])[0];
      root.innerHTML = `
        <div class="display-phase">FINAL SCORES</div>
        ${winner ? `<div class="winner-cup">🏆</div>
        <div class="display-title">${esc(winner.name)}</div>` : ''}
        ${lbRows(lbTeams, true)}
        <div class="writing-cue" style="margin-top: 1.5rem;">Thanks for playing 🌊</div>
      `;
    }

    poll();
    setInterval(poll, 2500);
  </script>
</body>
</html>
