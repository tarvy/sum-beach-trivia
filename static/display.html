<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="only light">
  <title>Display — Sum Beach Trivia</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { overflow: hidden; }
    .display-root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .display-brand {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
    }
    /* mid-size headline: round/section titles that sit above more content */
    .display-title--md { font-size: clamp(2rem, 5.5vw, 3.6rem); margin-bottom: 0.6rem; }
    .display-teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.8rem;
      width: 100%;
      max-width: 1000px;
      margin-top: 1rem;
    }
    .team-chip {
      background: var(--ground-2);
      border: 1px solid var(--ink);
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2.2vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .grid-label {
      font-family: var(--font-mono);
      font-size: clamp(0.7rem, 1.4vw, 0.9rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2rem;
    }
    .display-q-list {
      list-style: none;
      width: 100%;
      max-width: min(92vw, 950px);
      text-align: left;
    }
    .display-q-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--ink);
      font-family: var(--font-body);
      font-size: clamp(1.15rem, 2.6vw, 2rem);
      line-height: 1.4;
    }
    .display-q-item:last-child { border-bottom: none; }
    .display-q-item .badge { font-size: clamp(0.62rem, 1.2vw, 0.9rem); }
    .display-q-num {
      font-family: var(--font-mono);
      font-size: clamp(0.7rem, 1.3vw, 1rem);
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--ink);
      flex-shrink: 0;
      padding-top: 0.3em;
      min-width: 2.5em;
    }
    /* one-question-at-a-time */
    .round-label {
      font-family: var(--font-mono);
      font-size: clamp(0.8rem, 1.6vw, 1.1rem);
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 0.8rem;
    }
    .hero-q {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(1.8rem, 4.5vw, 3.6rem);
      line-height: 1.15; max-width: min(90vw, 1100px);
      letter-spacing: -0.01em;
    }
    .hero-answer {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(1.4rem, 3.2vw, 2.6rem);
      color: var(--accent-2); margin-top: 1.2rem;
      max-width: min(88vw, 1000px);
    }
    .hero-answer ol, .hero-answer ul { text-align: left; margin: 0.4em auto 0; display: inline-block; }
    .q-timer {
      display: flex; align-items: center; gap: 1rem;
      width: min(60vw, 560px); margin-top: 1.8rem;
    }
    .q-timer-track {
      flex: 1; height: 14px; background: var(--ground-2);
      border: 1px solid var(--ink); border-radius: var(--radius);
      overflow: hidden;
    }
    .q-timer-bar { height: 100%; width: 100%; background: var(--accent-2); transition: width 1s linear; }
    .q-timer-bar.warn { background: var(--accent); }
    .q-timer-bar.over { background: var(--danger); }
    .q-timer-num {
      font-family: var(--font-mono); font-weight: 700;
      font-size: clamp(1rem, 2.2vw, 1.6rem); min-width: 3.2ch; text-align: right;
    }
    .q-timer-num.over { color: var(--danger); }
    .prev-qs {
      position: fixed; top: 4rem; left: 1.2rem; z-index: 40;
      max-width: 26vw; text-align: left;
      font-size: clamp(0.75rem, 1.3vw, 1rem); color: var(--text-dim);
    }
    .prev-qs .pq { padding: 0.35em 0; border-bottom: 1px solid var(--border-subtle); }
    .prev-qs .pq:last-child { border-bottom: none; }
    .prev-qs .pq-num { font-family: var(--font-mono); font-weight: 700; margin-right: 0.5em; }
    /* standings ticker — wall-street style, fixed to the bottom edge */
    .ticker {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
      background: var(--ink); color: #fff;
      padding: 0.45em 0; overflow: hidden;
      border-top: 3px solid var(--brand);
    }
    .ticker-track {
      display: inline-block; white-space: nowrap;
      font-family: var(--font-mono); font-size: clamp(0.85rem, 1.7vw, 1.15rem);
      animation: tickerScroll 40s linear infinite;
    }
    .ticker .up   { color: var(--accent); }
    .ticker .sep  { opacity: 0.4; margin: 0 1.2em; }
    @keyframes tickerScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .lb-display-wrap {
      width: 100%;
      max-width: 700px;
    }
    /* podium: 1st/2nd/3rd get card treatment, gold on top */
    .lb-display-row.podium-1, .lb-display-row.podium-2, .lb-display-row.podium-3 {
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      padding: 0.3em 0.55em;
      margin-bottom: 0.3em;
    }
    .lb-display-row.podium-1 { background: var(--accent);   box-shadow: var(--shadow); font-size: 1.15em; }
    .lb-display-row.podium-2 { background: var(--ground-2); box-shadow: var(--shadow-sm); }
    .lb-display-row.podium-3 { background: var(--ground-3); box-shadow: var(--shadow-sm); }
    .lb-empty {
      font-family: var(--font-mono);
      font-size: clamp(0.8rem, 1.6vw, 1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 1rem;
    }
    .lobby-qr {
      width: clamp(180px, 26vmin, 320px);
      height: auto;
      margin-top: 1.5rem;
      background: #fff;
      padding: 0.75rem;
      border: 1px solid var(--ink);
      box-shadow: var(--shadow-sm);
      border-radius: var(--radius);
    }
    .join-url {
      font-family: var(--font-mono);
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      margin-top: 1rem;
      color: var(--ink-soft);
    }
    .join-url strong { color: var(--ink); }
    /* the written-out URL people type into their phones */
    .url-callout {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: clamp(1.3rem, 4vw, 2.8rem);
      background: var(--accent);
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.3em 0.6em;
      margin-top: 1.5rem;
      word-break: break-all;
    }
    /* pens-down (and other shouty) banner */
    .banner {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      background: var(--danger);
      color: #fff;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.35em 0.8em;
      margin-bottom: 1.2rem;
    }
    /* single big question (final round / tiebreak) */
    .final-q {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: min(92vw, 1000px);
      margin-top: 1rem;
    }
    .writing-cue {
      font-family: var(--font-mono);
      font-size: clamp(0.8rem, 1.6vw, 1.05rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-top: 1.25rem;
    }
    .winner-cup { font-size: clamp(3rem, 8vw, 5rem); line-height: 1; }
    .paused-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--ground);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    /* Gladys, your AI hostess — a caption in her voice under the content */
    .gladys-says {
      font-family: var(--font-body);
      font-style: italic;
      font-size: clamp(1rem, 2vw, 1.5rem);
      line-height: 1.35;
      color: var(--ink-soft);
      max-width: min(88vw, 900px);
      margin-top: 1.4rem;
    }
    .gladys-says .gladys-tag {
      display: block;
      font-family: var(--font-mono);
      font-style: normal;
      font-size: 0.62em;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-2);
      margin-bottom: 0.35em;
    }
    /* opt-in voice toggle, tucked top-right (clear of brand, prev-qs, ticker) */
    .gladys-voice-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 70;
      font-family: var(--font-mono);
      font-size: clamp(0.68rem, 1.2vw, 0.9rem);
      letter-spacing: 0.06em;
      padding: 0.5em 0.9em;
      background: var(--ground-2);
      border: 1px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      color: var(--ink);
      cursor: pointer;
    }
    .gladys-voice-btn.on { background: var(--accent); }
    .gladys-voice-btn.hidden { display: none; }
  </style>
</head>
<body>
  <span class="display-brand">Sum Beach Trivia</span>

  <div class="display-root" id="display-root">
    <!-- populated by JS -->
    <div class="display-phase" id="d-phase">CONNECTING</div>
    <div class="display-title" id="d-title">Sum Beach<br><span>Trivia</span></div>
  </div>

  <!-- shown on top of ANY phase while the host has the game paused -->
  <div class="prev-qs hidden" id="prev-qs"></div>
  <div class="ticker hidden" id="ticker"><div class="ticker-track" id="ticker-track"></div></div>

  <div class="paused-overlay hidden" id="paused-overlay">
    <div class="display-phase">PAUSED</div>
    <div class="display-title">Back in<br><span>a minute 🍹</span></div>
  </div>

  <button class="gladys-voice-btn hidden" id="gladys-voice-btn" type="button">🔇 Let Gladys talk</button>

  <script src="/gladys.js"></script>
  <script>
    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const root = document.getElementById('display-root');

    // the TV is unattended — reload the page itself whenever the server has
    // restarted (= a deploy), so this tab can never render stale UI
    let bootSeen = null;

    async function poll() {
      try {
        const [stateRes, lbRes, teamsRes] = await Promise.all([
          fetch('/api/state'),
          fetch('/api/leaderboard'),
          fetch('/api/teams')
        ]);
        if (!stateRes.ok) return;
        const state = await stateRes.json();
        if (bootSeen === null) bootSeen = state.boot;
        else if (state.boot && state.boot !== bootSeen) { location.reload(); return; }
        const lb    = lbRes.ok ? await lbRes.json() : {teams:[]};
        const teams = teamsRes.ok ? await teamsRes.json() : {teams:[]};
        render(state, lb, teams);
      } catch (_) {}
    }

    // timer context, re-synced on every poll; a 1s interval paints the countdown
    let timerCtx = null;   // {seconds, elapsed, at}

    function render(state, lb, teamsData) {
      const {phase, paused, current_round} = state;
      const teams = teamsData.teams || [];
      document.getElementById('paused-overlay').classList.toggle('hidden', !paused);

      // loose per-question timer only ticks while a question is live
      timerCtx = (phase === 'round_open' || phase === 'final_open') && state.question_elapsed != null
        ? {seconds: state.question_seconds || 60, elapsed: state.question_elapsed, at: Date.now()}
        : null;

      // previous questions of the live round, upper-left (during the answer
      // read-back the earlier answers ride along)
      const prevBox = document.getElementById('prev-qs');
      const showPrev = (phase === 'round_open' || phase === 'answers') &&
        current_round && current_round.questions.length > 1;
      prevBox.classList.toggle('hidden', !showPrev);
      if (showPrev) {
        const prev = current_round.questions.slice(0, -1);
        prevBox.innerHTML = '<p class="label mb-sm">Earlier this round</p>' +
          prev.map((q, i) => `<div class="pq"><span class="pq-num">${String(i+1).padStart(2,'0')}</span>${esc(q.text)}` +
            (q.answer ? ` — <strong>${esc(q.answer)}</strong>` : '') + `</div>`).join('');
      }

      // standings ticker after round 1 (and on the final) — never on round 1
      const tickerOn = ['round_open', 'round_closed', 'final_open'].includes(phase) &&
        current_round && (current_round.is_final || (current_round.round_number || 1) > 1) &&
        lb.teams.length > 0;
      renderTicker(tickerOn, lb.teams);

      switch (phase) {
        case 'draft':        renderDraft(teams); break;
        case 'lobby':        renderLobby(teams); break;
        case 'round_open':   renderRound(current_round, false); break;
        case 'round_closed': renderRound(current_round, true); break;
        case 'marking':      renderMarking(); break;
        case 'answers':      renderAnswers(current_round); break;
        case 'reveal':       renderReveal(current_round, lb.teams); break;
        case 'final_wager':  renderFinalWager(lb.teams, current_round); break;
        case 'final_open':   renderFinal(current_round); break;
        case 'tiebreak':     renderTiebreak(state.tiebreak_question); break;
        case 'done':         renderDone(lb.teams); break;
        default:             renderStandby(phase.replace(/_/g,' '), '');
      }

      driveGladys(state);
    }

    // ── Gladys: on-screen quips + opt-in Web Speech voice ──
    // phase -> her line-bank context (absent = she hushes, e.g. live writing time)
    const GLADYS_CONTEXT = {
      lobby: 'lobby', round_closed: 'round_closed', marking: 'marking',
      answers: 'answers', reveal: 'reveal', final_wager: 'final_wager',
      final_open: 'final_open', tiebreak: 'tiebreak', done: 'done',
    };
    let lastSpokenKey;   // undefined until the first paint (which primes silently)

    function driveGladys(state) {
      const btn = document.getElementById('gladys-voice-btn');
      const V = window.Gladys && window.Gladys.Voice;
      const modeGladys = (state.mc_mode || 'gladys') === 'gladys';
      const canSpeak = modeGladys && V && V.supported;

      // voice toggle: only in Gladys mode, only if this browser can speak
      btn.classList.toggle('hidden', !canSpeak);
      if (canSpeak) {
        btn.classList.toggle('on', V.enabled);
        btn.textContent = V.enabled ? '🔊 Gladys is live' : '🔇 Let Gladys talk';
      }

      const ctx = modeGladys && window.Gladys ? GLADYS_CONTEXT[state.phase] : null;
      const round = state.current_round;
      const roundId = round ? round.id : '';
      const isAnswers = state.phase === 'answers';
      // seed keeps the pick STABLE across the 2.5s poll; the answer read-back
      // varies it per question so each answer gets its own line.
      const seed = isAnswers ? (roundId + ':' + state.question_idx)
                             : (state.phase + ':' + roundId);
      const key = ctx ? (ctx + '|' + seed) : null;

      // caption under the content — present in text even with the sound off
      if (ctx) {
        const quip = window.Gladys.pickLine(ctx, seed);
        if (quip) {
          const cap = document.createElement('div');
          cap.className = 'gladys-says';
          cap.innerHTML = '<span class="gladys-tag">💋 Gladys says</span>' + esc(quip);
          root.appendChild(cap);
        }
      }

      // speak once per state change; first paint primes so a reload/redeploy
      // doesn't make her re-announce whatever's already on screen
      if (lastSpokenKey === undefined) { lastSpokenKey = key; return; }
      if (key !== lastSpokenKey) {
        if (key && V && V.enabled) {
          let toSay = window.Gladys.pickLine(ctx, seed);
          if (isAnswers && round) {
            const qs = round.questions || [];
            const ans = window.Gladys.answerText(qs[qs.length - 1]);
            if (ans) toSay += ' ' + window.Gladys.pickLine('answerLeadIn', seed) + ' ' + ans + '.';
          }
          V.speak(toSay);
        }
        lastSpokenKey = key;
      }
    }

    document.getElementById('gladys-voice-btn').addEventListener('click', () => {
      const V = window.Gladys && window.Gladys.Voice;
      if (!V) return;
      const on = V.toggle();   // this click also unlocks browser autoplay
      const btn = document.getElementById('gladys-voice-btn');
      btn.classList.toggle('on', on);
      btn.textContent = on ? '🔊 Gladys is live' : '🔇 Let Gladys talk';
      if (on) V.speak("Well hello, gorgeous. Gladys is on the mic — let's have some fun.");
    });

    // ── shared pieces ──

    function renderStandby(phaseLabel, message) {
      root.innerHTML = `
        <div class="display-phase">${esc(phaseLabel.toUpperCase())}</div>
        <div class="display-title">${esc(message)}</div>
      `;
    }

    function teamChips(teams, label) {
      if (!teams.length) return '';
      return `
        <div class="grid-label">${esc(label)}</div>
        <div class="display-teams-grid">${teams.map(t => `<div class="team-chip">${esc(t.name)}</div>`).join('')}</div>
      `;
    }

    // Leaderboard rows; podium=true dresses up 1st/2nd/3rd (medals + cards).
    function lbRows(teams, podium) {
      if (!teams || !teams.length) return `<p class="lb-empty">No scores yet</p>`;
      const medals = ['🥇','🥈','🥉'];
      return `<div class="lb-display-wrap lb-display">${teams.map((t, i) => `
        <div class="lb-display-row${podium && i < 3 ? ' podium-' + (i + 1) : ''}">
          <span class="lb-display-rank">${podium && i < 3 ? medals[i] : i + 1}</span>
          <span class="lb-display-name">${esc(t.name)}</span>
          <span class="lb-display-score">${t.total}</span>
        </div>`).join('')}</div>`;
    }

    function qItems(questions, withAuthors) {
      return (questions || []).map((q, i) =>
        `<li class="display-q-item">
          <span class="display-q-num">${String(i + 1).padStart(2, '0')}</span>
          <span>${esc(q.text)}${withAuthors && q.author_name ? ` <span class="badge badge--dim">by ${esc(q.author_name)}</span>` : ''}</span>
        </li>`
      ).join('');
    }

    // ── per-phase renderers ──

    function renderDraft(teams) {
      root.innerHTML = `
        <div class="display-phase">GET YOUR QUESTIONS IN!</div>
        <div class="display-title">Sum Beach<br><span>Trivia</span></div>
        <div class="url-callout">${esc(location.host)}/contribute.html</div>
        <div class="writing-cue">Type that into your phone ☝️</div>
        ${teamChips(teams, 'Teams so far')}
      `;
    }

    function renderLobby(teams) {
      root.innerHTML = `
        <div class="display-phase">LOBBY — SCAN TO JOIN</div>
        <div class="display-title">Sum Beach<br><span>Trivia</span></div>
        <img src="/api/qr?origin=${encodeURIComponent(location.origin)}" alt="Scan to join on your phone" class="lobby-qr">
        <div class="join-url">or go to <strong>${esc(location.host)}/play.html</strong></div>
        ${teams.length
          ? teamChips(teams, 'Teams in')
          : '<p class="grid-label">No teams yet — scan to be first</p>'}
      `;
    }

    function renderRound(round, pensDown) {
      if (!round) { renderStandby(pensDown ? 'Pens down' : 'Round open', ''); return; }
      const qs = round.questions || [];
      const roundTag = round.round_number
        ? `ROUND ${round.round_number} OF ${round.round_count}` : 'ROUND';
      if (pensDown) {
        // the round is over — all its questions come back to the main area
        root.innerHTML = `
          <div class="banner">✋ PENS DOWN — hand in your sheets!</div>
          <div class="display-phase">ROUND CLOSED</div>
          <div class="round-label">${esc(round.title || '')} · ${roundTag}</div>
          <ol class="display-q-list" aria-label="Questions">${qItems(qs, false)}</ol>
        `;
        return;
      }
      const liveQ = qs[qs.length - 1];
      root.innerHTML = `
        <div class="display-phase">QUESTION ${qs.length} OF ${round.question_count || qs.length}</div>
        <div class="round-label">${esc(round.title || '')} · ${roundTag}</div>
        <div class="hero-q">${liveQ ? esc(liveQ.text) : ''}</div>
        <div class="q-timer" aria-hidden="true">
          <div class="q-timer-track"><div class="q-timer-bar" id="q-timer-bar"></div></div>
          <span class="q-timer-num" id="q-timer-num"></span>
        </div>
        <div class="writing-cue">✍️ Write your answers on paper</div>
      `;
      paintTimer();
    }

    // answer read-back: Lacey walks question by question, answer huge under it
    function renderAnswers(round) {
      if (!round) { renderStandby('Answers', ''); return; }
      const qs = round.questions || [];
      const liveQ = qs[qs.length - 1];
      let answerHtml = '';
      if (liveQ && liveQ.answer_items && liveQ.answer_items.length) {
        answerHtml = (liveQ.ordered ? '<ol>' : '<ul>') +
          liveQ.answer_items.map(i => `<li>${esc(i)}</li>`).join('') +
          (liveQ.ordered ? '</ol>' : '</ul>');
      } else if (liveQ && liveQ.answer) {
        answerHtml = esc(liveQ.answer);
      }
      root.innerHTML = `
        <div class="display-phase">ANSWER ${qs.length} OF ${round.question_count || qs.length}</div>
        <div class="round-label">${esc(round.title || '')} · the answers</div>
        <div class="hero-q">${liveQ ? esc(liveQ.text) : ''}</div>
        <div class="hero-answer">${answerHtml}</div>
        ${liveQ && liveQ.author_name ? `<div class="writing-cue">✒️ ${esc(liveQ.author_name)}'s question</div>` : ''}
      `;
    }

    // loose countdown: purely a vibe — hitting zero blocks nothing
    function paintTimer() {
      const bar = document.getElementById('q-timer-bar');
      const num = document.getElementById('q-timer-num');
      if (!bar || !num || !timerCtx) return;
      const gone = timerCtx.elapsed + (Date.now() - timerCtx.at) / 1000;
      const left = Math.ceil(timerCtx.seconds - gone);
      const frac = Math.max(0, Math.min(1, left / timerCtx.seconds));
      bar.style.width = (frac * 100) + '%';
      bar.classList.toggle('warn', left <= 10 && left > 0);
      bar.classList.toggle('over', left <= 0);
      num.classList.toggle('over', left <= 0);
      num.textContent = left > 0
        ? `${Math.floor(left / 60)}:${String(left % 60).padStart(2, '0')}`
        : 'TIME!';
      if (left <= 0) bar.style.width = '100%';
    }
    setInterval(paintTimer, 1000);

    // ticker: content only swaps when standings change, so the CSS marquee
    // animation is never restarted by the 2.5s poll repaint
    function renderTicker(on, teams) {
      const el = document.getElementById('ticker');
      const track = document.getElementById('ticker-track');
      el.classList.toggle('hidden', !on);
      if (!on) { track.dataset.content = ''; return; }
      const entries = teams.map((t, i) =>
        `<span class="up">${i === 0 ? '▲' : '●'} ${i + 1}</span> ${esc(t.name)} ${t.total}pts`);
      const line = entries.join('<span class="sep">···</span>');
      const content = `<span>${line}<span class="sep">···</span></span><span>${line}<span class="sep">···</span></span>`;
      if (track.dataset.content !== content) {
        track.dataset.content = content;
        track.innerHTML = content;
      }
    }

    function renderMarking() {
      root.innerHTML = `
        <div class="display-phase">MARKING</div>
        <div class="display-title display-title--md">Sheets are in.<br><span>Marking…</span></div>
        <div class="writing-cue">Answers coming up next</div>
      `;
    }


    // Reveal: who wrote each question in the just-graded round, plus scores.
    // The MC reads the answers aloud — they never appear on screen.
    function renderReveal(round, lbTeams) {
      // scores and ranks only — the questions/answers had their moment in the read-back
      root.innerHTML = `
        <div class="display-phase">SCORES SO FAR</div>
        ${round ? `<div class="round-label">after ${esc(round.title || '')}</div>` : ''}
        ${lbRows(lbTeams, true)}
      `;
    }

    function renderFinalWager(lbTeams, round) {
      root.innerHTML = `
        <div class="display-phase">FINAL ROUND</div>
        <div class="display-title display-title--md">Place your wagers!</div>
        <div class="writing-cue">No cap — bet what you dare. Check the standings 👇</div>
        ${lbRows(lbTeams, false)}
      `;
    }

    function renderFinal(round) {
      if (!round) { renderStandby('Final round', ''); return; }
      const q = (round.questions || [])[0];
      root.innerHTML = `
        <div class="display-phase">FINAL ROUND</div>
        <div class="display-title display-title--md">${esc(round.title || 'Final Round')}</div>
        <p class="final-q">${esc(q ? q.text : '')}</p>
        <div class="writing-cue">${q && q.item_count
          ? `${q.item_count} answers${q.ordered ? ' — in order' : ''} · write them on paper ✍️`
          : '✍️ Write your answer on paper'}</div>
      `;
    }

    function renderTiebreak(question) {
      root.innerHTML = `
        <div class="display-phase">TIEBREAK</div>
        <div class="display-title display-title--md">TIEBREAKER!</div>
        ${question ? `<p class="final-q">${esc(question)}</p>` : ''}
        <div class="writing-cue">🎯 Closest guess wins</div>
      `;
    }

    function renderDone(lbTeams) {
      const winner = (lbTeams || [])[0];
      root.innerHTML = `
        <div class="display-phase">FINAL SCORES</div>
        ${winner ? `<div class="winner-cup">🏆</div>
        <div class="display-title">${esc(winner.name)}</div>` : ''}
        ${lbRows(lbTeams, true)}
        <div class="writing-cue" style="margin-top: 1.5rem;">Thanks for cooking breakfast, Connor! 🌊</div>
      `;
    }

    poll();
    setInterval(poll, 2500);
  </script>
</body>
</html>
