<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contribute Questions — Sum Beach Trivia</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav__brand">Sum Beach Trivia</a>
    <div class="nav__links">
      <a href="/contribute.html" class="active">Contribute</a>
      <a href="/play.html">Play</a>
      <a href="/host.html">Host</a>
      <a href="/display.html">Display</a>
    </div>
  </nav>

  <main>
    <div class="container container--narrow" style="padding-top: 2rem; padding-bottom: 4rem;">

      <div class="mb-sm">
        <p class="eyebrow">Question bank</p>
        <h1>Write your best questions</h1>
        <p class="text-dim mt-sm">3 required, 2 optional (5 max). Each needs a question, an answer, and a category.</p>
      </div>

      <div class="card mb-sm hidden" id="closed-banner" style="border-color: var(--accent);">
        <strong>Submissions are closed.</strong>
        <span class="text-dim">Here are the questions you submitted — they're locked in.</span>
      </div>

      <!-- Native form validation: required attributes enforce the 3 required blocks
           and per-field presence; the server re-checks everything (trust boundary). -->
      <form id="contribute-form">
        <div class="card stack mb-sm">
          <div class="field">
            <label for="author-name">Your name or team name</label>
            <input type="text" id="author-name" name="author" placeholder="e.g. Sandy Bottoms"
                   maxlength="80" autocomplete="off" required>
          </div>
        </div>

        <div id="question-blocks"></div>

        <div class="cluster mt-sm">
          <button type="submit" class="btn btn--primary" id="btn-submit">Submit my questions</button>
          <span class="label text-dim" id="submit-hint">3 required, up to 5 total</span>
        </div>
      </form>

      <!-- My questions list -->
      <section id="my-questions-wrap" class="mt-lg hidden">
        <hr class="sep" style="margin-top: 0;">
        <p class="eyebrow mb-sm">Your submissions</p>
        <ul class="q-list" id="my-q-list"></ul>
      </section>

    </div>
  </main>

  <div class="toast-area" id="toasts" role="status" aria-live="polite"></div>

  <script>
    let contributorId = null;
    let submissionsOpen = true;
    let categories = [];
    const REQUIRED = 3, MAX_Q = 5;

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toast(msg, type = 'info') {
      const area = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      area.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // Persisted browser identity: a random token in localStorage IS the contributor.
    function browserToken() {
      let t = localStorage.getItem('contributor_token');
      if (!t) {
        t = (crypto.randomUUID && crypto.randomUUID()) ||
            (Date.now() + '-' + Math.random().toString(36).slice(2));
        localStorage.setItem('contributor_token', t);
      }
      return t;
    }

    function catOptions(selected) {
      return ['<option value="">Pick a category…</option>']
        .concat(categories.map(c =>
          `<option value="${esc(c)}"${c === selected ? ' selected' : ''}>${esc(c)}</option>`))
        .join('');
    }

    // 5 blocks: first 3 required (HTML5 `required`), last 2 optional.
    function renderBlocks(existing = []) {
      const wrap = document.getElementById('question-blocks');
      let html = '';
      for (let i = 0; i < MAX_Q; i++) {
        const q = existing[i] || {};
        const req = i < REQUIRED;
        const reqAttr = req ? ' required' : '';
        const tag = req
          ? '<span class="badge">Required</span>'
          : '<span class="badge badge--dim">Optional</span>';
        html += `
          <div class="card stack mb-sm q-block" data-i="${i}">
            <div class="cluster" style="justify-content: space-between;">
              <h2 style="margin:0;">Question ${i + 1}</h2>${tag}
            </div>
            <div class="field">
              <label>Category</label>
              <select class="q-category"${reqAttr}>${catOptions(q.category)}</select>
            </div>
            <div class="field">
              <label>Question text</label>
              <textarea class="q-text" rows="2" placeholder="What year did the album drop?"${reqAttr}>${esc(q.text || '')}</textarea>
            </div>
            <div class="field">
              <label>Correct answer</label>
              <input type="text" class="q-answer" autocomplete="off" value="${esc(q.answer || '')}"${reqAttr}>
            </div>
            <div class="field">
              <label>Alternate accepted answers <span class="text-dim">(optional)</span></label>
              <input type="text" class="q-alt1" autocomplete="off" placeholder="Another spelling / phrasing" value="${esc((q.acceptable||[])[0] || '')}">
              <input type="text" class="q-alt2" autocomplete="off" placeholder="" value="${esc((q.acceptable||[])[1] || '')}" style="margin-top:0.5rem;">
            </div>
          </div>`;
      }
      wrap.innerHTML = html;
    }

    // Collect blocks that have any content. Optional empty blocks are dropped.
    function collectQuestions() {
      const out = [];
      document.querySelectorAll('.q-block').forEach(b => {
        const category = b.querySelector('.q-category').value;
        const text = b.querySelector('.q-text').value.trim();
        const answer = b.querySelector('.q-answer').value.trim();
        const acceptable = [b.querySelector('.q-alt1').value.trim(),
                            b.querySelector('.q-alt2').value.trim()].filter(Boolean);
        if (category || text || answer) out.push({ category, text, answer, acceptable });
      });
      return out;
    }

    async function loadCategories() {
      try {
        categories = (await (await fetch('/api/categories')).json()).categories || [];
      } catch (_) { toast('Could not load categories', 'err'); }
    }

    async function loadSubmissionsState() {
      try {
        submissionsOpen = (await (await fetch('/api/state')).json()).submissions_open;
      } catch (_) {}
      document.getElementById('closed-banner').classList.toggle('hidden', submissionsOpen);
      document.getElementById('contribute-form').classList.toggle('hidden', !submissionsOpen);
    }

    async function resolveContributor(name) {
      const r = await fetch('/api/contributor', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token: browserToken(), name })
      });
      if (!r.ok) return null;
      const d = await r.json();
      localStorage.setItem('contributor_recovery', d.recovery_code);
      return d.contributor_id;
    }

    async function loadMyQuestions() {
      if (contributorId == null) return [];
      try {
        const d = await (await fetch(`/api/questions/mine?contributor_id=${contributorId}`)).json();
        const list = document.getElementById('my-q-list');
        const wrap = document.getElementById('my-questions-wrap');
        if (!d.questions.length) { wrap.classList.add('hidden'); return []; }
        wrap.classList.remove('hidden');
        list.innerHTML = d.questions.map((q, i) => `
          <li class="q-item">
            <span class="q-num">${String(i+1).padStart(2,'0')}</span>
            <span class="q-text">${esc(q.text)}<br><span class="badge badge--dim">${esc(q.category)}</span></span>
          </li>`).join('');
        return d.questions;
      } catch (_) { return []; }
    }

    document.getElementById('contribute-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('author-name').value.trim();
      contributorId = await resolveContributor(name);
      if (contributorId == null) { toast('Could not save your name', 'err'); return; }

      const questions = collectQuestions();
      if (questions.length < REQUIRED) { toast(`Fill in at least ${REQUIRED} questions`, 'err'); return; }

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      try {
        const r = await fetch('/api/questions/set', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ contributor_id: contributorId, author: name, questions })
        });
        if (!r.ok) {
          const er = await r.json().catch(() => ({}));
          toast(er.detail || 'Save failed', 'err');
          return;
        }
        toast('Questions saved!', 'ok');
        renderBlocks(await loadMyQuestions());
      } catch (_) {
        toast('Network error', 'err');
      } finally {
        btn.disabled = false;
      }
    });

    (async function init() {
      await Promise.all([loadCategories(), loadSubmissionsState()]);
      // Returning visit: resolve identity from the browser token and prefill.
      const savedName = localStorage.getItem('contributor_name') || '';
      let mine = [];
      if (savedName) {
        document.getElementById('author-name').value = savedName;
        contributorId = await resolveContributor(savedName).catch(() => null);
        mine = contributorId != null ? await loadMyQuestions() : [];
      }
      renderBlocks(mine);
    })();

    document.getElementById('author-name').addEventListener('input', e =>
      localStorage.setItem('contributor_name', e.target.value));
  </script>
</body>
</html>
