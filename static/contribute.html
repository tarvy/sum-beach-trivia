<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contribute Questions — Sum Beach Trivia</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav__brand">Sum Beach Trivia</a>
  </nav>

  <main>
    <a href="/" id="back-arrow" class="hidden" aria-label="Exit"
       style="position:absolute; left:1.5rem; top:5rem; font-size:1.75rem; line-height:1; text-decoration:none;">←</a>
    <div class="container container--narrow" style="padding-top: 2rem; padding-bottom: 4rem;">

      <div class="card mb-sm hidden" id="closed-banner" style="border-color: var(--accent);">
        <strong>Submissions are closed.</strong>
        <span class="text-dim">Here are the questions you submitted — they're locked in.</span>
      </div>

      <div class="progress" id="progress" role="img" aria-label="Submission progress">
        <span class="node" data-i="1">1</span>
        <span class="node-line"></span>
        <span class="node" data-i="2">2</span>
        <span class="node-line"></span>
        <span class="node" data-i="3">3</span>
        <span class="node-line node-line--opt"></span>
        <span class="node node--opt" data-i="4">4</span>
        <span class="node-line node-line--opt"></span>
        <span class="node node--opt" data-i="5">5</span>
      </div>

      <h2 id="optional-heading" class="hidden mb-sm" style="text-align:center;">Optional Question</h2>

      <div class="card mb-sm hidden" id="limit-banner" style="text-align:center; border-color: var(--accent);">
        <strong>You're all set — that's the max of 5 questions. 🎉</strong>
        <span class="text-dim">Edit any of yours below if you want.</span>
      </div>

      <!-- Single question form -->
      <div class="card stack" id="form-card">
        <div class="field">
          <label for="author-name">Name</label>
          <input type="text" id="author-name" placeholder="Gladys" maxlength="80" autocomplete="off">
        </div>
        <div class="field">
          <label for="category-select">Category</label>
          <select id="category-select">
            <option value="">Loading categories…</option>
          </select>
        </div>
        <div class="field">
          <label for="q-text">Question text</label>
          <textarea id="q-text" placeholder="What year did the Margaritaville concept album drop?" rows="3"></textarea>
        </div>
        <div class="field">
          <label for="q-answer">Correct answer</label>
          <input type="text" id="q-answer" placeholder="The answer the host will accept" autocomplete="off">
        </div>
        <div class="field">
          <label for="q-alt1">Alternate accepted answer <span class="text-dim">(optional)</span></label>
          <input type="text" id="q-alt1" placeholder="Another way to spell or phrase it" autocomplete="off">
        </div>
        <div class="field">
          <label for="q-alt2">Second alternate <span class="text-dim">(optional)</span></label>
          <input type="text" id="q-alt2" placeholder="" autocomplete="off">
        </div>
        <div class="cluster">
          <button class="btn btn--primary" id="btn-submit-q">Submit question</button>
          <button class="btn btn--secondary btn--sm hidden" id="btn-cancel-edit">Cancel edit</button>
        </div>
      </div>

      <!-- My questions list -->
      <section id="my-questions-wrap" class="mt-lg hidden">
        <hr class="sep" style="margin-top: 0;">
        <p class="eyebrow mb-sm">Your submissions</p>
        <ul class="q-list" id="my-q-list"></ul>
      </section>

    </div>
  </main>

  <div class="toast-area" id="toasts" role="status" aria-live="polite"></div>

  <script>
    // ── state ────────────────────────────────────────────────
    let submitCount = 0;     // = number of questions saved by this contributor
    let editingId = null;    // id of the question currently being edited, or null
    let myQuestions = [];    // cache of this contributor's saved questions
    let contributorId = null;
    let submissionsOpen = true;
    const REQUIRED_Q = 3;
    const MAX_Q = 5;

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── toast ────────────────────────────────────────────────
    function toast(msg, type = 'info') {
      const area = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      area.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // ── identity ─────────────────────────────────────────────
    // A random browser token IS the contributor; the server upserts it to a
    // contributor row (+ recovery code) and returns its id. Name is an editable label.
    function browserToken() {
      let t = localStorage.getItem('contributor_token');
      if (!t) { t = crypto.randomUUID(); localStorage.setItem('contributor_token', t); }
      return t;
    }
    async function resolveContributor(name) {
      try {
        const r = await fetch('/api/contributor', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ token: browserToken(), name })
        });
        if (!r.ok) return null;
        const d = await r.json();
        localStorage.setItem('contributor_recovery', d.recovery_code);
        return d.contributor_id;
      } catch (_) { return null; }
    }

    // ── categories + submission window ───────────────────────
    async function loadCategories() {
      try {
        const r = await fetch('/api/categories');
        const d = await r.json();
        const sel = document.getElementById('category-select');
        sel.innerHTML = d.categories.length
          ? d.categories.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('')
          : '<option value="">No categories available</option>';
      } catch (_) {
        toast('Could not load categories', 'err');
      }
    }
    async function loadSubmissionsState() {
      try { submissionsOpen = (await (await fetch('/api/state')).json()).submissions_open; } catch (_) {}
      document.getElementById('closed-banner').classList.toggle('hidden', submissionsOpen);
      document.getElementById('progress').classList.toggle('hidden', !submissionsOpen);
      document.getElementById('form-card').classList.toggle('hidden', !submissionsOpen);
    }

    // ── submit / save question ───────────────────────────────
    document.getElementById('btn-submit-q').addEventListener('click', async () => {
      if (!editingId && submitCount >= MAX_Q) { toast(`You've submitted ${MAX_Q} questions — that's the limit`, 'info'); return; }
      const authorName = document.getElementById('author-name').value.trim();
      const selectedCategory = document.getElementById('category-select').value;
      const text = document.getElementById('q-text').value.trim();
      const answer = document.getElementById('q-answer').value.trim();
      if (!authorName)       { toast('Enter your name first', 'err'); return; }
      if (!selectedCategory) { toast('Pick a category', 'err'); return; }
      if (!text)             { toast('Write a question', 'err'); return; }
      if (!answer)           { toast('Add the answer', 'err'); return; }

      const alt1 = document.getElementById('q-alt1').value.trim();
      const alt2 = document.getElementById('q-alt2').value.trim();
      const acceptable = [alt1, alt2].filter(Boolean);

      const btn = document.getElementById('btn-submit-q');
      btn.disabled = true; btn.classList.add('is-loading');
      try {
        // ensure we have a contributor id (also refreshes the display name)
        contributorId = await resolveContributor(authorName);
        if (contributorId == null) { toast('Could not save your name', 'err'); return; }

        const r = await fetch(editingId ? `/api/questions/${editingId}` : '/api/questions', {
          method: editingId ? 'PUT' : 'POST',
          headers: {'Content-Type': 'application/json'},
          body: editingId
            ? JSON.stringify({ contributor_id: contributorId, category: selectedCategory, text, answer, acceptable })
            : JSON.stringify({ author: authorName, category: selectedCategory, text, answer, acceptable, contributor_id: contributorId })
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          if (r.status === 409) loadSubmissionsState();   // window just closed
          toast(e.detail || 'Save failed', 'err');
          return;
        }
        toast(editingId ? 'Changes saved!' : 'Question submitted!', 'ok');
        clearForm();              // resets fields + edit mode
        await loadMyQuestions();  // refreshes list + node bar
        document.getElementById('q-text').focus();
      } catch (_) {
        toast('Network error', 'err');
      } finally {
        btn.disabled = false; btn.classList.remove('is-loading');
      }
    });

    document.getElementById('btn-cancel-edit').addEventListener('click', clearForm);

    function clearForm() {
      editingId = null;
      ['q-text','q-answer','q-alt1','q-alt2'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('btn-cancel-edit').classList.add('hidden');
      updateCount();
    }

    function updateCount() {
      const current = submitCount + 1;  // the next step to fill ("you are here")
      document.querySelectorAll('#progress .node').forEach(n => {
        const i = Number(n.dataset.i);
        const done = i <= submitCount;
        n.classList.toggle('done', done);
        n.classList.toggle('current', i === current && current <= MAX_Q);
        n.textContent = done ? '✓' : i;   // check on done, number otherwise
      });
      document.querySelectorAll('#progress .node-line').forEach((l, i) => {
        l.classList.toggle('filled', i + 1 < submitCount);
      });
      // once past the required minimum, the rest is optional: label it + offer an exit
      const pastMin = submitCount >= REQUIRED_Q && !editingId;
      document.getElementById('optional-heading').classList.toggle('hidden', !pastMin);
      document.getElementById('back-arrow').classList.toggle('hidden', !pastMin);

      // at the limit (and not editing) there's nothing to fill — hide the form, show a done banner
      const atLimit = submitCount >= MAX_Q && !editingId;
      document.getElementById('form-card').classList.toggle('hidden', atLimit);
      document.getElementById('limit-banner').classList.toggle('hidden', !atLimit);
      if (atLimit) document.getElementById('optional-heading').classList.add('hidden');

      const btn = document.getElementById('btn-submit-q');
      btn.disabled = false;
      btn.textContent = editingId ? 'Save changes' : 'Submit question';
    }

    // ── my questions (editable) ──────────────────────────────
    async function loadMyQuestions() {
      if (contributorId == null) return;
      try {
        const r = await fetch(`/api/questions/mine?contributor_id=${contributorId}`);
        const d = await r.json();
        myQuestions = d.questions;
        submitCount = d.questions.length;
        const list = document.getElementById('my-q-list');
        const wrap = document.getElementById('my-questions-wrap');
        wrap.classList.toggle('hidden', !d.questions.length);
        list.innerHTML = d.questions.map((q, i) => `
          <li class="q-item">
            <span class="q-num">${String(i+1).padStart(2,'0')}</span>
            <span class="q-text">${esc(q.text)}<br><span class="badge badge--dim">${esc(q.category)}</span></span>
            <button class="btn btn--secondary btn--sm" data-edit="${q.id}" style="margin-left:auto">Edit</button>
          </li>`).join('');
        updateCount();
      } catch (_) {}
    }

    // load a saved question into the form for editing
    document.getElementById('my-q-list').addEventListener('click', e => {
      const id = e.target.dataset.edit;
      if (!id) return;
      const q = myQuestions.find(x => String(x.id) === id);
      if (!q) return;
      editingId = q.id;
      document.getElementById('category-select').value = q.category;
      document.getElementById('q-text').value = q.text;
      document.getElementById('q-answer').value = q.answer;
      document.getElementById('q-alt1').value = q.acceptable[0] || '';
      document.getElementById('q-alt2').value = q.acceptable[1] || '';
      document.getElementById('btn-cancel-edit').classList.remove('hidden');
      updateCount();
      document.getElementById('q-text').scrollIntoView({behavior:'smooth', block:'center'});
    });

    // ── init ─────────────────────────────────────────────────
    (async function init() {
      updateCount();   // paint the stepper's initial state (step 1 = current)
      await Promise.all([loadCategories(), loadSubmissionsState()]);
      const savedName = localStorage.getItem('contributor_name');
      if (savedName) {
        document.getElementById('author-name').value = savedName;
        contributorId = await resolveContributor(savedName);  // returning visitor
        await loadMyQuestions();
      }
    })();
    document.getElementById('author-name').addEventListener('input',
      e => localStorage.setItem('contributor_name', e.target.value));
  </script>
</body>
</html>
